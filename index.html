<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Beauty by Daniela – Engwilen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #222222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        h1, h2 {
            color: #b03a6b;
            letter-spacing: 2px;
            text-align: center;
        }

        .header-box {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .angebot-bild {
            width: 180px;
            height: auto;
            border-radius: 10px;
        }

        .gif-container {
            max-width: 90vw;
            max-height: 80vh;
        }

        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }

        /* Galerie */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Anfahrt */
        .anfahrt {
            width: 90%;
            max-width: 900px;
            margin: 40px auto 60px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: white;
            font-size: 18px;
        }

        .anfahrt iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- Kopfbereich -->
    <div class="header-box">
        <h1>NEU IN ENGWILEN!</h1>
        <img src="bilder/Visitenkarte-1.jpg" alt="Visitenkarte" class="angebot-bild">
    </div>

    <!-- Angebot -->
    <div class="gif-container">
        <img src="bilder/Beauty-by-Daniela Angebot.JPG" alt="Beauty-by-Daniela Angebot">
    </div>

    <!-- Galerie -->
    <h2>Galerie</h2>
    <div class="gallery">
        <img src="bilder/foto1.jpg" alt="Bild 1">
        <img src="bilder/foto2.jpg" alt="Bild 2">
        <img src="bilder/foto3.jpg" alt="Bild 3">
        <img src="bilder/foto4.jpg" alt="Bild 4">
        <img src="bilder/foto5.jpg" alt="Bild 5">
        <img src="bilder/foto6.jpg" alt="Bild 6">
    </div>

    <!-- Anfahrt -->
    <h2>Anfahrt</h2>
    <div class="anfahrt">
        <p>
            Beauty by Daniela<br>
            Hauptstrasse 12<br>
            8564 Engwilen
        </p>

        <iframe 
            src="https://www.google.com/maps?q=Engwilen&output=embed"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>

</body>
</html>
