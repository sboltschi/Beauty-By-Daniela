<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Neu in Engwilen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #222222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        h1 {
            color: #b03a6b;
            margin: 0;
            letter-spacing: 2px;
        }

        .header-box {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .angebot-bild {
            width: 180px;
            height: auto;
            border-radius: 10px;
        }

        .gif-container {
            max-width: 90vw;
            max-height: 80vh;
        }

        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="header-box">
        <h1>NEU IN ENGWILEN!</h1>
        <img src="bilder/Visitenkarte-1.jpg" alt="Visitenkarte" class="angebot-bild">
    </div>

    <div class="gif-container">
        <img src="bilder/Beauty-by-Daniela Angebot.JPG" alt="Beauty-by-Daniela Angebot">
    </div>

</body>
</html>
