<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Beauty by Daniela</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fbe9f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            color: #b03a6b;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .gif-container {
            max-width: 90vw;
            max-height: 80vh;
        }

        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <h1>Beauty by Daniela</h1>

    <div class="gif-container">
        <!-- Ersetze 'bilder/beauty-animation.gif' durch den Pfad zu deinem JPG -->
        <img src="bilder/beauty-animation.jpg" alt="Beauty by Daniela Animation">
    </div>
</body>
</html>
