<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Beauty by Daniela – Engwilen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #222222;
            color: white;
        }

        h1, h2 {
            color: #b03a6b;
            letter-spacing: 2px;
        }

        /* Hauptlayout: links Inhalt, rechts Galerie */
        .layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            padding: 20px;
        }

        /* Linke Spalte */
        .content {
            max-width: 600px;
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .angebot-bild {
            width: 160px;
            border-radius: 10px;
        }

        .gif-container img {
            width: 100%;
            border-radius: 10px;
            margin-top: 20px;
        }

        /* Rechte Spalte: Galerie */
        .gallery {
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: sticky;
            top: 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Anfahrt */
        .anfahrt iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- Linke Spalte -->
    <div class="content">

        <div class="header-box">
            <h1>NEU IN ENGWILEN!</h1>
            <img src="bilder/Visitenkarte-1.jpg" class="angebot-bild" alt="Visitenkarte">
        </div>

        <div class="gif-container">
            <img src="bilder/Beauty-by-Daniela Angebot.JPG" alt="Beauty-by-Daniela Angebot">
        </div>

        <h2>Anfahrt</h2>
        <p>
            Beauty by Daniela<br>
            Hauptstrasse 12<br>
            8564 Engwilen
        </p>

        <iframe 
            src="https://www.google.com/maps?q=Engwilen&output=embed"
            loading="lazy">
        </iframe>

    </div>

    <!-- Rechte Spalte: Galerie -->
    <div class="gallery">
        <img src="bilder/foto1.jpg" alt="Bild 1">
        <img src="bilder/foto2.jpg" alt="Bild 2">
        <img src="bilder/foto3.jpg" alt="Bild 3">
        <img src="bilder/foto4.jpg" alt="Bild 4">
        <img src="bilder/foto5.jpg" alt="Bild 5">
        <img src="bilder/foto6.jpg" alt="Bild 6">
    </div>

</div>

</body>
</html>
